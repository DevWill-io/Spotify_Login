<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Spotify 1.0 </title>
</head>
<body>

  <div class="login-wrapper">
    <header class="header-logo">
      <div class="logo-container">
        <i class="fa-brands fa-spotify" aria-hidden="true"></i>
        <span class="brand-name">Spotify</span>
      </div>
      <h1 class="main-title">Milhões de músicas.<br>Grátis no Spotify.</h1>
    </header>

    <main class="auth-container">
      <button class="btn btn-primary" type="button">Inscreva-se grátis</button>

      <div class="ou">
        <span>ou</span>
      </div>

      <section class="social-login">
        <button class="btn btn-outline">
          <i class="fa-brands fa-google"></i> Continuar com o Google
        </button>
        
        <button class="btn btn-outline">
          <i class="fa-brands fa-facebook"></i> Continuar com o Facebook
        </button>
        
        <button class="btn btn-outline">
          <i class="fa-brands fa-apple"></i> Continuar com a Apple
        </button>
      </section>

      <hr class="separador">

      <footer class="login-footer">
        <p>Já tem uma conta? <a href="#" class="login-link">Entrar</a></p>
      </footer>
    </main>
  </div>

</body>
</html>
